spring.application.name=api2026

# port par défaut de tomcat
server.port=9000

# niveau de level logging
logging.level.root=error
# pour mon package
logging.level.training.afpa.cda24060=info
# pour la BDD
logging.level.org.springframework.data=info
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
# niveau de logging pour TOMCAT
logging.level.org.springframework.boot.web.embedded.tomcat=info

# chargement du .env
#spring.config.import=optional:file:.env
# parametrage de la BDD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/springboot}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# modifie la BDD en fonction des entity pour le mode developpement sinon none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Active Actuator
# * en dev
# health, info en prod
# Activer tous les endpoints (sauf ceux désactivés explicitement)
management.endpoints.web.exposure.include=info,health,metrics,prometheus
# Autoriser l'accès à /actuator/health et /actuator/info sans authentification
management.endpoint.health.show-details=always
management.endpoint.info.enabled=true


# Personnaliser les infos dans /actuator/info version antérieur 4.0 sinon passer par une classe CustomInfoContributor
